<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Villa Borinquen</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f1ea;
      color: #2f2a26;
      padding: 18px;
    }

    header {
      background: #6d5a4b;
      color: white;
      padding: 28px 18px;
      border-radius: 22px;
      text-align: center;
      margin-bottom: 22px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    header p {
      margin: 0;
      font-size: 16px;
    }

    .buscador {
      margin-bottom: 12px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 14px;
      border: 1px solid #d4c8bb;
      font-size: 16px;
      box-sizing: border-box;
      background: white;
    }

    .filtros {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-bottom: 18px;
      padding-bottom: 6px;
    }

    .filtros button {
      border: none;
      padding: 11px 16px;
      border-radius: 24px;
      background: white;
      font-weight: bold;
      color: #4b3f35;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .filtros button.activo {
      background: #4b3f35;
      color: white;
    }

    #contador {
      color: #6f6258;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .catalogo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .categoria {
      display: inline-block;
      background: #eadfce;
      color: #4b3f35;
      padding: 6px 11px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .vecino {
      color: #777;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .descripcion {
      font-size: 15px;
      line-height: 1.45;
      margin-bottom: 14px;
    }

    .tags {
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      background: #f3eee7;
      color: #5d524a;
      padding: 5px 8px;
      border-radius: 12px;
      font-size: 12px;
      margin: 2px;
    }

    .whatsapp {
      display: block;
      text-align: center;
      background: #25D366;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
    }

    .vacio {
      display: none;
      text-align: center;
      color: #777;
      margin-top: 25px;
    }

    footer {
      text-align: center;
      margin-top: 35px;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Catálogo Vecinal Villa Borinquen</h1>
    <p>Servicios, productos y emprendimientos de vecinos y vecinas del sector</p>
  </header>

  <section class="buscador">
    <input 
      type="text" 
      id="buscar" 
      placeholder="Buscar: uber, pasteles, miel, plantas, fletes..."
    >

    <select id="categoria">
      <option value="Todos">Todas las categorías</option>
      <option value="Transporte">Transporte</option>
      <option value="Alimentos">Alimentos</option>
      <option value="Hogar y jardín">Hogar y jardín</option>
      <option value="Servicios">Servicios</option>
      <option value="Mascotas">Mascotas</option>
      <option value="Belleza">Belleza</option>
    </select>

    <div class="filtros">
      <button class="activo" onclick="filtrarCategoria('Todos', this)">Todos</button>
      <button onclick="filtrarCategoria('Transporte', this)">🚗 Transporte</button>
      <button onclick="filtrarCategoria('Alimentos', this)">🍰 Alimentos</button>
      <button onclick="filtrarCategoria('Hogar y jardín', this)">🌱 Hogar y jardín</button>
      <button onclick="filtrarCategoria('Servicios', this)">🔧 Servicios</button>
      <button onclick="filtrarCategoria('Mascotas', this)">🐕 Mascotas</button>
      <button onclick="filtrarCategoria('Belleza', this)">💅 Belleza</button>
    </div>
  </section>

  <p id="contador"></p>

  <main class="catalogo" id="catalogo"></main>

  <p class="vacio" id="vacio">No se encontraron emprendimientos con esa búsqueda.</p>

  <footer>
    Catálogo comunitario de ejemplo · Datos modificables por la Junta de Vecinos
  </footer>

  <script>
    const emprendimientos = [
      {
        nombre: "Traslados Don Mauricio",
        vecino: "Mauricio Irribarra",
        categoria: "Transporte",
        descripcion: "Traslados particulares dentro de Viña del Mar, Valparaíso, Quilpué y alrededores. Ideal para viajes cortos, compras, trámites y traslados seguros.",
        tags: ["traslados", "uber", "auto", "viajes"],
        whatsapp: "56912345678"
      },
      {
        nombre: "Fletes Pequeños y Mudanzas",
        vecino: "Felipe Contreras",
        categoria: "Transporte",
        descripcion: "Fletes pequeños, traslado de muebles, compras grandes, retiro de encomiendas y apoyo en mudanzas chicas.",
        tags: ["fletes", "mudanza", "muebles", "camioneta"],
        whatsapp: "56999990000"
      },
      {
        nombre: "Tortas y Pasteles La Vecina",
        vecino: "Carolina Muñoz",
        categoria: "Alimentos",
        descripcion: "Tortas, kuchenes, queques, alfajores y pasteles caseros para cumpleaños, once familiar o pedidos especiales.",
        tags: ["tortas", "pasteles", "cumpleaños", "once"],
        whatsapp: "56987654321"
      },
      {
        nombre: "Miel Natural del Cerro",
        vecino: "Patricia González",
        categoria: "Alimentos",
        descripcion: "Venta de miel natural, propóleo y productos derivados de la colmena. Formatos pequeños y familiares.",
        tags: ["miel", "propóleo", "natural", "colmena"],
        whatsapp: "56911112222"
      },
      {
        nombre: "Pan Amasado y Sopaipillas",
        vecino: "Rosa Espinoza",
        categoria: "Alimentos",
        descripcion: "Pan amasado, sopaipillas, pebre y masas caseras para la once. Pedidos por encargo.",
        tags: ["pan", "sopaipillas", "once", "casero"],
        whatsapp: "56977778888"
      },
      {
        nombre: "Tierra de Hoja y Plantitas",
        vecino: "Marcela Soto",
        categoria: "Hogar y jardín",
        descripcion: "Venta de tierra de hoja, plantas ornamentales, suculentas, maceteros y apoyo básico para armar tu rincón verde.",
        tags: ["plantas", "tierra", "jardín", "maceteros"],
        whatsapp: "56933334444"
      },
      {
        nombre: "Gasfitería y Reparaciones Don Juan",
        vecino: "Juan Pérez",
        categoria: "Servicios",
        descripcion: "Reparaciones menores del hogar: filtraciones, cambio de flexibles, grifería, sifones, instalaciones simples y mantenciones.",
        tags: ["gasfiter", "reparaciones", "filtraciones", "hogar"],
        whatsapp: "56922223333"
      },
      {
        nombre: "Paseos y Cuidado de Mascotas",
        vecino: "Camilo Rojas",
        categoria: "Mascotas",
        descripcion: "Paseo de perros, alimentación y cuidado básico de mascotas por hora o por jornada, según disponibilidad.",
        tags: ["perros", "mascotas", "paseos", "cuidado"],
        whatsapp: "56955556666"
      },
      {
        nombre: "Manicure y Perfilado",
        vecino: "Daniela Araya",
        categoria: "Belleza",
        descripcion: "Manicure tradicional, esmaltado permanente, perfilado de cejas y servicios de belleza a pedido.",
        tags: ["manicure", "uñas", "cejas", "belleza"],
        whatsapp: "56944445555"
      }
    ];

    let categoriaActual = "Todos";

    const catalogo = document.getElementById("catalogo");
    const buscar = document.getElementById("buscar");
    const categoria = document.getElementById("categoria");
    const contador = document.getElementById("contador");
    const vacio = document.getElementById("vacio");

    function limpiarTexto(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function mostrarEmprendimientos() {
      const textoBusqueda = limpiarTexto(buscar.value);

      const resultados = emprendimientos.filter(e => {
        const textoCompleto = limpiarTexto(
          e.nombre + " " +
          e.vecino + " " +
          e.categoria + " " +
          e.descripcion + " " +
          e.tags.join(" ")
        );

        const coincideBusqueda = textoCompleto.includes(textoBusqueda);
        const coincideCategoria = categoriaActual === "Todos" || e.categoria === categoriaActual;

        return coincideBusqueda && coincideCategoria;
      });

      catalogo.innerHTML = "";

      resultados.forEach(e => {
        const mensaje = encodeURIComponent(
          `Hola ${e.vecino}, vi tu emprendimiento "${e.nombre}" en el catálogo vecinal de Villa Borinquen y me gustaría consultar.`
        );

        const tagsHTML = e.tags.map(tag => `<span class="tag">${tag}</span>`).join("");

        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <span class="categoria">${e.categoria}</span>
          <h2>${e.nombre}</h2>
          <p class="vecino">Vecino/a: ${e.vecino}</p>
          <p class="descripcion">${e.descripcion}</p>
          <div class="tags">${tagsHTML}</div>
          <a class="whatsapp" href="https://wa.me/${e.whatsapp}?text=${mensaje}" target="_blank">
            Contactar por WhatsApp
          </a>
        `;

        catalogo.appendChild(card);
      });

      contador.textContent = `Mostrando ${resultados.length} de ${emprendimientos.length} emprendimientos`;
      vacio.style.display = resultados.length === 0 ? "block" : "none";
    }

    function filtrarCategoria(nombreCategoria, boton) {
      categoriaActual = nombreCategoria;
      categoria.value = nombreCategoria;

      document.querySelectorAll(".filtros button").forEach(btn => {
        btn.classList.remove("activo");
      });

      boton.classList.add("activo");
      mostrarEmprendimientos();
    }

    buscar.addEventListener("input", mostrarEmprendimientos);

    categoria.addEventListener("change", function() {
      categoriaActual = this.value;

      document.querySelectorAll(".filtros button").forEach(btn => {
        btn.classList.remove("activo");

        if (btn.textContent.includes(categoriaActual) || categoriaActual === "Todos" && btn.textContent.includes("Todos")) {
          btn.classList.add("activo");
        }
      });

      mostrarEmprendimientos();
    });

    document.addEventListener("DOMContentLoaded", mostrarEmprendimientos);
  </script>

</body>
</html>
